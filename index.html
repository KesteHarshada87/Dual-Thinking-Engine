<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Human vs Machine Thinking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🧠 Human vs 🤖 Machine</h1>

  <div class="input-box">
    <input id="userInput" placeholder="Type your problem..." />
    <button onclick="startThinking()">Analyze</button>
  </div>

  <div class="container">
    <div class="panel human">
      <h2>👤 Human Thinking</h2>
      <div id="humanOutput"></div>
    </div>

    <div class="panel machine">
      <h2>🤖 Machine Thinking</h2>
      <div id="machineOutput"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
